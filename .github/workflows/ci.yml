name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  ESPFLASH_SKIP_UPDATE_CHECK: "true"

jobs:
  host_checks:
    name: Host checks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        cache-directories: .embuild
        cache-targets: false

    - name: Shell syntax check
      run: bash -n scripts/*.sh

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Lint with Clippy
      run: cargo clippy --workspace --all-targets --locked -- -D warnings

    - name: Build
      run: cargo build --workspace --locked

    - name: Run host tests
      run: cargo test --workspace --locked

  esp32s3_target_preflight:
    name: ESP32-S3 target preflight
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install native dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build python3 python3-pip python3-venv libusb-1.0-0 libudev-dev

    - name: Install Rust Xtensa toolchain
      uses: esp-rs/xtensa-toolchain@v1.7
      with:
        version: "1.90.0.0"
        default: true
        buildtargets: esp32s3
        ldproxy: true

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        cache-directories: ".embuild"
        cache-targets: "false"

    - name: Shell syntax check
      run: bash -n scripts/*.sh

    - name: Toolchain diagnostics
      run: |
        rustup toolchain list
        cargo -V
        rustc -V

    - name: Target build preflight
      run: ./scripts/check_target_build.sh

    - name: Install espflash
      run: cargo install espflash --version 4.4.0 --locked

    - name: Package flashable firmware image
      run: ./scripts/package_firmware.sh

    - name: Stage artifacts for upload
      run: |
        mkdir -p target/dist
        cp target/firmware/usb2ble-fw-esp32s3-merged.bin target/dist/
        cp target/firmware/usb2ble-fw-esp32s3-manifest.txt target/dist/
        cp target/xtensa-esp32s3-espidf/debug/usb2ble-fw target/dist/

    - name: Upload flashable firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: usb2ble-fw-esp32s3-flashable
        path: target/dist/
        if-no-files-found: error
        retention-days: 30

  web_checks:
    name: Web app checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build Web App
        run: |
          cd web
          npm install
          npm run build

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [host_checks, esp32s3_target_preflight]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: usb2ble-fw-esp32s3-flashable
          path: firmware

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest USB2BLE firmware
          fail_on_unmatched_files: true
          overwrite_files: true
          make_latest: true
          files: |
            firmware/usb2ble-fw-esp32s3-merged.bin
            firmware/usb2ble-fw-esp32s3-manifest.txt
            firmware/usb2ble-fw

  pages_build:
    name: Build Web App and Pages Artifact
    runs-on: ubuntu-latest
    needs: [host_checks, esp32s3_target_preflight, web_checks]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Download Firmware Artifacts
        uses: actions/download-artifact@v4
        with:
          name: usb2ble-fw-esp32s3-flashable
          path: firmware-dist

      - name: Build Web App
        run: |
          cd web
          npm install
          npm run build

      - name: Prepare Firmware Assets
        run: |
          mkdir -p web/dist/firmware
          cp firmware-dist/usb2ble-fw-esp32s3-merged.bin web/dist/firmware/
          cat << 'EOF' > web/dist/firmware/manifest.json
{
  "name": "USB2BLE",
  "version": "latest",
  "new_install_prompt_erase": true,
  "builds": [
    {
      "chipFamily": "ESP32-S3",
      "parts": [
        {
          "path": "usb2ble-fw-esp32s3-merged.bin",
          "offset": 0
        }
      ]
    }
  ]
}
EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  pages_deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: [pages_build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
