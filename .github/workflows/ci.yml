name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  host_checks:
    name: Host checks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Shell syntax check
      run: bash -n scripts/*.sh

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Lint with Clippy
      run: cargo clippy --workspace --all-targets --locked -- -D warnings

    - name: Build
      run: cargo build --workspace --locked

    - name: Run host tests
      run: cargo test --workspace --locked

  esp32s3_target_preflight:
    name: ESP32-S3 target preflight
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install native dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build python3 python3-pip python3-venv libusb-1.0-0 libudev-dev

    - name: Install Rust Xtensa toolchain
      uses: esp-rs/xtensa-toolchain@v1.7
      with:
        version: "1.90.0.0"
        default: true
        buildtargets: esp32s3
        ldproxy: true

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Shell syntax check
      run: bash -n scripts/*.sh

    - name: Toolchain diagnostics
      run: |
        rustup toolchain list
        cargo -V
        rustc -V

    - name: Target build preflight
      run: ./scripts/check_target_build.sh

    - name: Upload target firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: usb2ble-fw-xtensa-esp32s3-espidf
        path: target/xtensa-esp32s3-espidf/debug/usb2ble-fw
        if-no-files-found: error
